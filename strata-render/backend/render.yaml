services:
  - type: web
    name: strata-backend
    env: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: strata-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: CORS_ORIGINS
        value: '["*"]'

databases:
  - name: strata-db
    databaseName: strata
    user: strata
    plan: free
